name: Manual Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select the test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api
      test_env:
        description: 'Select the environment tier'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - beta
          - prod

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.test_type }}" == "all" ]; then
            npm run test
          elif [ "${{ github.event.inputs.test_type }}" == "ui" ]; then
            npm run test:ui
          elif [ "${{ github.event.inputs.test_type }}" == "api" ]; then
            npm run test:api
          fi
        env:
          TEST_ENV: ${{ github.event.inputs.test_env }}

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Push Allure history
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Playwright Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manual-playwright-results
          path: |
            playwright-report/
            allure-report/
            test-results/
            allure-results/
          retention-days: 30

  send-email:
    needs: [test]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: manual-playwright-results
          path: manual-playwright-results

      - name: Install dependencies
        run: npm ci

      - name: Debug File Structure
        run: ls -R manual-playwright-results/

      - name: Send Email Report
        run: node scripts/generateEmailReport.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TEST_ENV: ${{ github.event.inputs.test_env }}
