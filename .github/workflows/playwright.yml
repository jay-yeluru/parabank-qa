name: ParaBank E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "BASE_URL=${{ vars.BASE_URL || 'https://parabank.parasoft.com' }}" >> .env
          echo "API_BASE_URL=${{ vars.API_BASE_URL || 'https://parabank.parasoft.com/parabank/services_proxy/bank' }}" >> .env

      - name: Run UI Tests
        run: npm run test:ui
        continue-on-error: true

      - name: Run API Tests
        run: npm run test:api
        continue-on-error: true

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results (JUnit XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload screenshots/videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts
          path: |
            test-results/**/*.png
            test-results/**/*.webm
          retention-days: 7

  report:
    name: Publish Test Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Download Playwright Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        continue-on-error: true
